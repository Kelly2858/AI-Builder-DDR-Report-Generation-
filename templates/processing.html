<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing — DDR Report Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { max-width: 500px; width: 100%; padding: 20px; text-align: center; }
        
        .spinner {
            width: 60px; height: 60px;
            border: 4px solid #334155;
            border-top: 4px solid #60a5fa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        h2 {
            font-size: 24px; font-weight: 700;
            margin-bottom: 12px;
        }
        .status-text {
            color: #94a3b8; font-size: 14px;
            margin-bottom: 24px; min-height: 20px;
        }
        
        .steps { text-align: left; margin-top: 24px; }
        .step {
            padding: 12px 16px;
            background: #1e293b;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            border: 1px solid #334155;
            display: flex; align-items: center; gap: 10px;
        }
        .step.active { border-color: #60a5fa; }
        .step.done { border-color: #34d399; }
        .step-icon { font-size: 18px; }

        .result { display: none; margin-top: 24px; }
        .result a {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            transition: all 0.3s;
        }
        .result a:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(59,130,246,0.4); }
        
        .error { display: none; color: #f87171; margin-top: 16px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <h2 id="title">Generating DDR Report...</h2>
        <div class="status-text" id="statusText">This may take 1-2 minutes. The AI is analyzing your documents...</div>
        
        <div class="steps">
            <div class="step active" id="step1"><span class="step-icon">📄</span> Parsing documents & extracting images</div>
            <div class="step" id="step2"><span class="step-icon">🤖</span> AI extraction with Gemini</div>
            <div class="step" id="step3"><span class="step-icon">🔀</span> Merging & resolving conflicts</div>
            <div class="step" id="step4"><span class="step-icon">📊</span> Building professional report</div>
        </div>

        <div class="result" id="result">
            <a href="/report/{{ report_id }}" target="_blank">📄 View DDR Report</a>
        </div>
        <div class="error" id="error"></div>
    </div>

    <script>
        const reportId = "{{ report_id }}";
        let stepIndex = 0;
        const steps = ['step1','step2','step3','step4'];
        
        function advanceStep() {
            if (stepIndex < steps.length) {
                document.getElementById(steps[stepIndex]).classList.add('active');
                if (stepIndex > 0) {
                    document.getElementById(steps[stepIndex-1]).classList.remove('active');
                    document.getElementById(steps[stepIndex-1]).classList.add('done');
                }
            }
        }
        
        // Simulate step progress
        const stepTimer = setInterval(() => {
            stepIndex++;
            if (stepIndex < steps.length) advanceStep();
        }, 15000);

        // Poll for status
        const pollInterval = setInterval(async () => {
            try {
                const res = await fetch('/status/' + reportId);
                const data = await res.json();
                
                if (data.status === 'done') {
                    clearInterval(pollInterval);
                    clearInterval(stepTimer);
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('title').textContent = '✅ Report Ready!';
                    document.getElementById('statusText').textContent = 'Your DDR report has been generated successfully.';
                    document.getElementById('result').style.display = 'block';
                    // Mark all steps done
                    steps.forEach(s => { 
                        document.getElementById(s).classList.remove('active');
                        document.getElementById(s).classList.add('done');
                    });
                } else if (data.status === 'error') {
                    clearInterval(pollInterval);
                    clearInterval(stepTimer);
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('title').textContent = '❌ Generation Failed';
                    document.getElementById('statusText').textContent = '';
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('error').textContent = 'Error: ' + data.error;
                }
            } catch (e) {
                console.error('Poll error:', e);
            }
        }, 3000);
    </script>
</body>
</html>
